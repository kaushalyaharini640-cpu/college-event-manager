<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}College Event Management System{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='portfolio.css') }}">
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <a class="brand" href="{{ url_for('home') }}">College Event Hub</a>
      <nav class="nav-links">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('student_events') }}">Events</a>
        <a href="{{ url_for('student_dashboard') }}">Student</a>
        <a href="{{ url_for('admin_dashboard') }}">Admin</a>
        <a href="{{ url_for('login') }}">Login</a>
      </nav>
    </header>

    <main class="content">
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="auth-card" style="margin-bottom: 16px; padding: 14px 18px;">
            {% for message in messages %}
              <p style="margin: 0; font-weight: 600;">{{ message }}</p>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
